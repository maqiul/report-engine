name: Frontend CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  vue-build:
    name: @reportengine/vue build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: report-engine-vue/package-lock.json

      - name: Install
        run: cd report-engine-vue && npm ci

      - name: Type check
        run: cd report-engine-vue && npm run type-check

      - name: Build
        run: cd report-engine-vue && npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: report-engine-vue-dist
          path: report-engine-vue/dist/
          if-no-files-found: error
          retention-days: 14

  vue-sample-build:
    name: @reportengine/vue sample build
    runs-on: ubuntu-latest
    needs: vue-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: report-engine-vue-sample/package-lock.json

      - name: Install sample
        run: cd report-engine-vue-sample && npm install

      - name: Build sample
        run: cd report-engine-vue-sample && npx vite build

      - name: Upload sample dist
        uses: actions/upload-artifact@v4
        with:
          name: report-engine-vue-sample-dist
          path: report-engine-vue-sample/dist/
          if-no-files-found: error
          retention-days: 14

  web-frontend-build:
    name: web/frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install
        run: cd web/frontend && npm install

      - name: Type check
        run: cd web/frontend && npm run type-check

      - name: Build
        run: cd web/frontend && npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: web-frontend-dist
          path: web/frontend/dist/
          if-no-files-found: error
          retention-days: 14

  publish-npm:
    name: Publish @reportengine/vue to npm
    needs: vue-build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: cd report-engine-vue && npm ci

      - name: Build
        run: cd report-engine-vue && npm run build

      - name: Publish
        run: cd report-engine-vue && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
