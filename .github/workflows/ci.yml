name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: 8.0.x

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ReportEngine.slnx

      - name: Build
        run: dotnet build ReportEngine.slnx --no-restore --configuration Debug

      - name: Test
        run: dotnet test ReportEngine.slnx --no-build --configuration Debug --logger "console;verbosity=normal"

  pack:
    name: Pack NuGet (Linux)
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Pack Core
        run: dotnet pack ReportEngine.Core/ReportEngine.Core.csproj -c Release -o ./artifacts

      - name: Pack Export.Excel
        run: dotnet pack ReportEngine.Export.Excel/ReportEngine.Export.Excel.csproj -c Release -o ./artifacts

      - name: Pack Export.Pdf
        run: dotnet pack ReportEngine.Export.Pdf/ReportEngine.Export.Pdf.csproj -c Release -o ./artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish to NuGet
    needs: pack
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Pack Core
        run: dotnet pack ReportEngine.Core/ReportEngine.Core.csproj -c Release -o ./artifacts

      - name: Pack Export.Excel
        run: dotnet pack ReportEngine.Export.Excel/ReportEngine.Export.Excel.csproj -c Release -o ./artifacts

      - name: Pack Export.Pdf
        run: dotnet pack ReportEngine.Export.Pdf/ReportEngine.Export.Pdf.csproj -c Release -o ./artifacts

      - name: Push to NuGet.org
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        if: env.NUGET_API_KEY != ''
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Upload artifacts (tag build)
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-tag
          path: ./artifacts/*.nupkg
          if-no-files-found: error
          retention-days: 30
