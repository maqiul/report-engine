spring.application.name=report-engine-backend

# ============= Server =============
server.port=5000

# ============= H2 数据库（嵌入式，零外部依赖） =============
spring.datasource.url=jdbc:h2:mem:reportengine;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Web Console（开发用）：http://localhost:5000/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============= JPA =============
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ============= Logging =============
logging.level.org.springframework.web=INFO
logging.level.com.reportengine=INFO
logging.level.org.hibernate.SQL=WARN

# ============= OpenAPI / Swagger =============
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============= CORS（前端开发调试用） =============
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*