server.port=8080
spring.application.name=report-engine-demo-backend

# H2 内存数据库（订单数据）
spring.datasource.url=jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 报告引擎配置（start 自动注入）
report.engine.enabled=true
report.engine.auto-rest-api=true
report.engine.rest-prefix=/api/reports
report.engine.font-path=

# 业务数据：演示用 3 个销售订单
demo.orders.count=3
