# ReportEngine 一键启动
# 使用：cd D:\report-engine\docker && docker compose up -d
# 访问：
#   前端:      http://localhost:3000
#   后端:      http://localhost:5000
#   Swagger:   http://localhost:5000/swagger-ui.html
#   OpenAPI:   http://localhost:5000/v3/api-docs

version: "3.8"

# context 是仓库根，所有路径相对 D:\report-engine
services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    image: reportengine-backend:0.2.0
    container_name: reportengine-backend
    ports:
      - "5000:5000"
    environment:
      - TZ=Asia/Shanghai
      - JAVA_OPTS=-Xms256m -Xmx512m -Dfile.encoding=UTF-8
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/v3/api-docs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    image: reportengine-frontend:0.2.0
    container_name: reportengine-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
